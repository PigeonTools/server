name: CI Checks

on:
  push:
    branches: [main]
  pull_request:
    # Runs on all PRs

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Type Check
        id: typecheck
        run: npm run typecheck
        # Removed continue-on-error: true so the job fails if typecheck fails

      - name: Report Status
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{secrets.GITHUB_TOKEN}}
          script: |
            const status = '${{ steps.typecheck.outcome }}';
            const message = status === 'success' ? '✅ Type Check Passed' : '❌ Type Check Failed';
            
            const marker = '<!-- lumo-ci-typecheck -->';
            const body = `${marker}\n\n${message}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number || context.ref.split('/').pop(),
            });

            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body
              });
            } else if (context.issue.number) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }

  test:
    runs-on: ubuntu-latest
    needs: [] 
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Tests
        id: test
        run: npm run test
        # Removed continue-on-error: true so the job fails if tests fail

      - name: Report Status
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{secrets.GITHUB_TOKEN}}
          script: |
            const status = '${{ steps.test.outcome }}';
            const message = status === 'success' ? '✅ Tests Passed' : '❌ Tests Failed';

            const marker = '<!-- lumo-ci-test -->';
            const body = `${marker}\n\n${message}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number || context.ref.split('/').pop(),
            });

            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body
              });
            } else if (context.issue.number) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }
