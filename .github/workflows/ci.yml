name: CI Checks

permissions:
  pull-requests: write
  contents: read
  issues: write

on:
  push:
    branches: [main]
  pull_request:

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Type Check
        id: typecheck
        run: npm run typecheck

      - name: Report Status
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{secrets.GITHUB_TOKEN}}
          script: |
            const status = '${{ steps.typecheck.outcome }}';
            const message = status === 'success' ? '✅ Type Check Passed' : '❌ Type Check Failed';
            
            const marker = '<!-- lumo-ci-typecheck -->';
            const body = `${marker}\n\n${message}`;

            // Only attempt to comment if this is a PR (has an issue number)
            if (!context.issue.number) {
              console.log('Not a PR event (likely direct push to main). Skipping comment.');
              return;
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }

  test:
    runs-on: ubuntu-latest
    needs: []
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Tests
        id: test
        run: npm run test

      - name: Report Status
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{secrets.GITHUB_TOKEN}}
          script: |
            const status = '${{ steps.test.outcome }}';
            const message = status === 'success' ? '✅ Tests Passed' : '❌ Tests Failed';

            const marker = '<!-- lumo-ci-test -->';
            const body = `${marker}\n\n${message}`;

            // Only attempt to comment if this is a PR
            if (!context.issue.number) {
              console.log('Not a PR event (likely direct push to main). Skipping comment.');
              return;
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }
